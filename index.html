<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#171717">
<!-- iOS 홈 화면 웹앱 모드 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <!-- 외부 CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- iOS 홈 화면 아이콘 -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/ejf-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <title>EJF Radio</title>

  <!-- Tailwind (개발용 CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 외부 CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-neutral-900 text-white max-w-md mx-auto">
<header class="flex justify-between items-center px-4 py-3 text-lg font-semibold">
  <div>
    <div>FM Radio</div>
    <div id="currentTime" class="text-xs font-normal text-gray-400 mt-0.5"></div>
  </div>
  <button id="powerBtn" class="w-9 h-9 rounded-full bg-neutral-700"></button>
</header>

<div class="px-4">
  <div id="dial" class="relative rounded-xl overflow-hidden bg-neutral-900">
    <div id="scale" class="scale"></div>
    <div id="needle"></div>
    <input id="freqRange" type="range" min="87.5" max="108" step="0.1" class="absolute inset-0 opacity-0 z-20">
  </div>

  <div id="dialInfo">
    <div class="flex items-start justify-between">
      <!-- 왼쪽: 주파수 / 채널 / 프로그램 -->
      <div class="flex flex-col">
        <div id="freqText" class="leading-tight"></div>
        <div id="stationText" class="mt-1 text-[13px] text-gray-300 leading-tight"></div>
        <div id="nowProgram" class="mt-0.5 text-[12px] text-gray-400 leading-tight"></div>
      </div>

      <!-- 오른쪽: stereo 램프 + mute 버튼 -->
      <div class="flex flex-col items-end gap-1">
        <div class="flex items-center gap-1">
          <div id="stereoLamp" class="stereo"></div>
        </div>
        <div class="flex items-center gap-1">
          <button
            id="muteBtn"
            class="w-2 h-2 rounded-full bg-yellow-400/40"
            aria-label="음소거 전환"
          ></button>
        </div>
      </div>
    </div>
  </div>

  <div id="tabs" class="flex justify-around px-6 mt-6"></div>
<div id="channelList" class="px-4 py-4"></div>
</div>

<!-- 외부 JS -->
<script src="script.js"></script>
</body>
</html>
