<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile IPTV Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>IPTV Player</h1>
      <label class="file-btn">
        재생목록 불러오기
        <input type="file" id="playlistFile" accept=".m3u,.m3u8" hidden />
      </label>
    </header>

    <section class="status-wrap">
      <p id="status">m3u 또는 m3u8 파일을 선택하세요.</p>
    </section>

    <section class="list-wrap">
      <ul id="channelList"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
